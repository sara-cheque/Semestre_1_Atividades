<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h3>Exercicio 5</h3>

    <button onclick="Jogar()">Jogar</button> <br><br><br>
    <div id="exibirResultado1"></div> 
    <div id="exibirResultado2"></div>
    
</body>
</html>

<script>

    let player1 = 0
    let player2 = 0
    let empate = 0
    
    function Jogar(){

        let min = 0
        let max = 2
        let intervalo = max - min
        let aleatorio1 = Math.random()
        let aleatorio2 = Math.random()
        let resultado1 = (aleatorio1 * intervalo + min).toFixed()
        let resultado2 = (aleatorio2 * intervalo + min).toFixed()

        let foto = [
            `<img width="200px" height="200px" src='https://w7.pngwing.com/pngs/347/176/png-transparent-icon-rock-stone-rock-silhouette.png'>`,
            `<img width="200px" height="200px" src='https://upload.wikimedia.org/wikipedia/commons/3/3f/Paper_sheet.jpg'>`,
            `<img width="200px" height="200px" src='https://a-static.mlcdn.com.br/800x560/tesoura-multiuso-profissional-grande-20cm-8-polegada-inox-clink/storebf/15900184056/af05c5c72c6747eeeb842248ba708fe3.jpeg'>`
        ]

        // 1 = pedra
        // 2 = papel 
        // 3 = tesoura

        let foto1 = foto[resultado1]
        let foto2 = foto[resultado2]
          
        if (resultado1 == 0){
            
            if (resultado2 == 0){
                empate++
            } else if (resultado2 == 1){
                player2++
            } else if(resultado2 == 2){
                player1++
            }
            
        } else if (resultado1 == 1){
            if (resultado2 == 0){
                player1++
            } else if (resultado2 == 1){
                empate++
            } else if(resultado2 == 2){
                player2++
            }
            
        } else if (resultado1 == 2){
            if (resultado2 == 0){
                player2++
            } else if (resultado2 == 1){
                player1++
            } else if(resultado2 == 2){
                empate++
            }
        }

        
        exibirResultado1.innerHTML = `${foto1}  X  ${foto2}` 
        exibirResultado2.innerHTML = `<br> <br> jogador 1: ${player1} vitorias <br> jogador 2: ${player2} vitorias`

       
    }
</script>
