<!DOCTYPE html>
<html lang="en">

<body>

    <h3>Exercicio 2</h3>

    <button onclick="sortear()">Sortear time</button> <br>
    <div id="exibirResultado"></div>
    
</body>
</html>

<script>

    function sortear(){
        let aleatorio = Math.random()
        let max = 4
        let min = 1
        let intervalo = max - min
        let resultado = aleatorio * intervalo + min
        let valor = resultado.toFixed()

        let foto1 = `<img src="https://logodetimes.com/times/sao-paulo/logo-sao-paulo-4096.png"  height="150">`
        let foto2 = `<img src="https://logodetimes.com/wp-content/uploads/corinthians.png"  height="150">`
        let foto3 = `<img src="https://logodetimes.com/wp-content/uploads/palmeiras.png"  height="150">`
        let foto4 = `<img src="https://logodetimes.com/wp-content/uploads/santos.png"  height="150">`

        if (valor == 4){
            exibirResultado.innerHTML = `${foto1}`
            console.log(1)
        } else if (valor == 3){
            exibirResultado.innerHTML = `${foto2}`
            console.log(2)
        } else if (valor == 2){
            exibirResultado.innerHTML = `${foto3}`
        } else if (valor == 1){
            exibirResultado.innerHTML = `${foto4}`
        }
       
    }
</script>
