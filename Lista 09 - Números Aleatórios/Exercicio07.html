<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h3>Exercicio 07</h3>

    <button onclick="Quero()">Quero um número cabalistico!</button> <br><br>

    <div id="exibirResultado"></div>
    
</body>
</html>

<script>

    function Quero(){

        let min = 1
        let max = 15
        let intervalo = max - min
        let aleatorio = Math.random()
        let resultado = (intervalo * aleatorio + min).toFixed()

        let cabalistico = [3, 4, 7, 10, 12]
        let cabControle = false

        console.log(resultado)

        for (let i = 0; i < cabalistico.length; i++){
            if (resultado == cabalistico[i]){
                cabControle = true
            } 
        }

        if (cabControle){
            exibirResultado.innerHTML = `Eu S2 números cabalísticos!`
        } else {
            exibirResultado.innerHTML = `Ah, me dá um número bom na próxima!`
        }


    }
</script>
