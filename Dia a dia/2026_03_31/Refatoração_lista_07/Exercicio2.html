<!DOCTYPE html>
<html lang="en">
<head>

    <title>Frase Repetitiva</title>
</head>
<body>

    <h3>2. Frase Repetitiva</h3>

    <button onclick="falar()">Diga algo sobre a matéria de algoritimo</button> <br><br>

    <div id="exibirResultado"></div>
    
</body>

<script>

    
    function falar(){
        for (let contador = 1; contador <= 7; contador++){
            exibirResultado.innerHTML += `<br> Muito boa`
        }
    }


</script>
