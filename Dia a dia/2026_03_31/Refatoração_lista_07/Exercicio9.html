<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 9. Viva o 7! </title>
</head>
<body>

    <h3>9. Viva o 7!</h3>

    Digite um número (entre 0 e 200):
    <input type="text" id="inpNumero"> <br><br>

    <button onclick="filtrar()"> Viva o 7! </button>
    <div id="exibirResultado"></div>

</body>
</html>

<script>
    
    

    function filtrar() { 
        let numero = inpNumero.value

        if (numero => 0 && numero <= 200) {
            for (let contador = 0; contador < numero; contador++) {
                if (contador % 7 == 0) {
                    exibirResultado.innerHTML += `${contador} <br>`;   
                } 
            } 
        } 
    }
</script>
