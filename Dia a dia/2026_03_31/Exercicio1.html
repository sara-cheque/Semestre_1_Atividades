<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h3>Tabuada</h3>

    <input type="text" id="inpNumero"> <br><br>
    <button onclick="contar()">Tabuada</button>
    <div id="exibirResultado"></div>
    
</body>
</html>

<script>

    function contar(){
        exibirResultado.innerHTML = ""
        let numero = Number(inpNumero.value)
        
        for(let contador = 1; contador <= 10; contador++){
            let resultado = contador * numero
            exibirResultado.innerHTML += `<br> ${numero} X ${contador} = ${resultado}`
        }
    }



</script>
