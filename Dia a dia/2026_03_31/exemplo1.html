<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick="contar()">For</button>

    <div id="exibirResultado"></div>
    
</body>
</html>

<script>

    function contar(){
        for(let contador = 1; contador <= 10; contador++){
            exibirResultado.innerHTML += `<br> ${contador}`
        }
    }



</script>
