<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Invasão de Impel Down</title>
</head>
<body>

    <h3>Desafio: Invasão de Impel Down</h3>

    Quantidade de batalhas
    <input type="text" id="inpBatalha"> <br><br>

    Quantidade de marinheiros em cada batalha
    <input type="text" id="inpMarinheiro"> <br><br>

    Quantidade de carnes disponíveis
    <input type="text" id="inpCarnes"> <br><br>

    <button onclick="batalha()">Nova batalha</button> <br><br>

    <div id="exibirResultado"></div>
        
</body>
</html>

<script>

    let energia = 100 
    let marinheiros = 0
    
    function batalha(){

        let qtdBatalha = Number(inpBatalha.value)
        let qtdMarinheiro = Number(inpMarinheiro.value)
        let qtdcarnes = Number(inpCarnes.value)

        for (let i = 0; i < qtdBatalha; i++){

            if (qtdcarnes > 0 && energia >= 10){
                
                energia -= 10

                if (energia < 10){
                    qtdcarnes -= 1
                    energia += 100
                }
    
                if(energia => 5){
                    for (let j = 0; j < qtdMarinheiro; j++){
                        energia -= 5
                        marinheiros++ // pra contar no final dps     
                    }  
   
                } 
    
    
            } else {
                // Luffy nao tem mais energia nem carne PERDE
            }
        }

    }



</script>
