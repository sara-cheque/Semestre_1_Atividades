<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while</title>
</head>
<body>

    <button onclick="Contar()">Contar ate   10</button>
    <div id="exibirResultado"></div>
    
</body>
</html>

<script>

    let contador = 0

    /*function Contar(){
        while (contador <  10000){
            contador++
            exibirResultado.innerHTML += `<br> ${contador}`
        } 
    }*/

    // mais rapido com a variavel mensagem
    function Contar(){

        let mensagem = ''
        while (contador <  10000){
            contador++
            mensagem += `<br> ${contador}`
                
        }
            
        exibirResultado.innerHTML = mensagem
    }

</script>
