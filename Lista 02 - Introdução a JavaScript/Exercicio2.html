<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de peso</title>
</head>
<body>

    <h1>Calculadora de peso</h1>

    <h3>Peso:</h2>
    <input type="number" name="Peso" id="Peso"><br>

    <h3>Altura</h2>
    <input type="number" name="Altura" id="Altura"><br><br>

    <button onclick="Calculadora()"> Fale comigo </button>

</body>
</html>

<script>


    function Calculadora(){

        alert(`Você pesa ${Peso.value}Kg e tem ${Altura.value}M de altura`)

    }

</script>
