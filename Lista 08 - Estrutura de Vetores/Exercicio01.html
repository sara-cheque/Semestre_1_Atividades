<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Viva de Filmes Favoritos</title>
</head>
<body>

    <h3>1. Lista Viva de Filmes Favoritos</h3>

    <input type="text" id="inpFilme"><br><br>

    <button onclick="Cadastrar()">Cadastrar</button>

    <div id="exibirResultado"></div>
    
</body>
</html>

<script>
    
    let listaFilme = [];
    
    function Cadastrar(){
        let filme = inpFilme.value

        listaFilme.push(filme)

        exibirResultado.innerHTML += `<br> ${listaFilme[listaFilme.length -1 ]}`

    }



</script>
