<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fases do sono </title>
</head>
<body>

    <h3>Fases do sono</h3>

    Quantidade de horas de sono:
    <input style="width: 50px;" type="text" id="qdtHoras"> <br><br>

    <button onclick="CalcularSono()">Calcular sono</button> <br><br>

    <b id="ExibirResultado1"></b> <br>
    <p id="ExibirResultado2"></p> 
    <p id="ExibirResultado3"></p> 
    <p id="ExibirResultado4"></p> 
    <p id="ExibirResultado5"></p>
    
</body>
</html>

<script>

    function CalcularSono(){

        let horas = Number(qdtHoras.value)

        let fase1 = (horas * 5) / 100
        let fase2 = (horas * 45) / 100
        let fase3 = (horas * 30) / 100 
        let fase4 = (horas * 20) / 100

        ExibirResultado1.innerHTML = (`Ao dormir ${horas} horas, você dormiu:`)
        ExibirResultado2.innerHTML = (`${fase1} horas na fase 1`)  
        ExibirResultado3.innerHTML = (`${fase2} horas na fase 2`)  
        ExibirResultado4.innerHTML = (`${fase3} horas na fase 3`)  
        ExibirResultado5.innerHTML = (`${fase4} horas na fase REM`)  

       


    }


</script>
