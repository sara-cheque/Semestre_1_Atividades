<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18. Divisores</title>
</head>
<body>

    <!-- 
    Crie  um programa o qual:

    a) Receba um número do usuário, que deve estar entre 0 e 100;

    b) Ao clicar no botão "Ver Divisores", deve exibir na tela, abaixo do botão, 
    todos os divisores do número informado, como o exemplo abaixo, onde o usuário inseriu o número "10": 
    -->

    <h3>18. Divisores</h3>

    Digite um número entre 0 á 100
    <input type="text" id="inpNumero"> <br><br>

    <button onclick="divisores()">Ver divisores</button> <br><br>

    <div id="exibirResultado"></div>
    
</body>
</html>

<script>
        
        function divisores(){
            let numero = Number(inpNumero.value)
            let contador = 1
 
            while (contador < numero){
                contador++
                let conta = numero % contador
                if (conta == 0){
                    exibirResultado.innerHTML += `<br> ${contador}`
                }
            }
            
        }
    
</script>
