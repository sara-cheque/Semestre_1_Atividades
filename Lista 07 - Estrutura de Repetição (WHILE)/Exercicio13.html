<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 13. Papagaio Repetitivo </title>
</head>
<body>

    <h3>13. Papagaio Repetitivo</h3>
    
    Digite um número:
    <input type="text" id="inpNumero"><br><br>

    Digite uma frase:
    <input type="text" id="inpFrase"><br><br>

    <button onclick="papagaio()"> Papagaio Repetitivo </button>
    <div id="exibirResultado"></div>

</body>
</html>

<script>
    let contador = 0;  

    function papagaio() { 
        let numero = Number(inpNumero.value);
        let frase = inpFrase.value;
        let mensagem = ''

        while (contador < numero) {
            contador++;
            mensagem += ` ${frase}`;
            exibirResultado.innerHTML += `${contador} - ${mensagem} <br>`
        } 
    }
</script>
