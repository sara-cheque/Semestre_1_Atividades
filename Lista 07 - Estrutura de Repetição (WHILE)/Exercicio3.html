<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frase Repetitiva</title>
</head>
<body>

    <h3>2. Frase Repetitiva</h3>

    <button onclick="falar()">Diga algo sobre a matéria de algoritimo</button> <br><br>

    <div id="exibirResultado"></div>
    
</body>
</html>

<script>

    contador = 1
    function falar(){
        while (contador <= 7){
            exibirResultado.innerHTML += `<br>  ${contador}. Muito boa`
            contador++
        }
    }


</script>
