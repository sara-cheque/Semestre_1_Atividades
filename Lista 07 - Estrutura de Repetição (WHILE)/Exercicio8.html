<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8. Múltiplos de 5</title>
</head>
<body>

    <h3>8. Múltiplos de 5</h3>

    Digite um número (entre 20 e 100):
    <input type="text" id="inpNumero"> <br><br>

    <button onclick="multiplo()"> multiplo </button>
    <div id="exibirResultado"></div>

</body>
</html>

<script>
   
    let contador = 0;

    function multiplo() { 
        let numero = inpNumero.value

        if (numero => 20 && numero <= 100) {
            while (contador < numero) {
                contador += 1;
                if (contador % 5 == 0) {
                    exibirResultado.innerHTML += `${contador} <br>`;   
                } 
            } 
        } 
    } 
</script>
