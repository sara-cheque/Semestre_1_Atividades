<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Viagens</title>
</head>
<body>

    <h3>2. Diário de Viagens: Do Primeiro ao Último Destino</h3>

    Destino de viagem <br><br>
    <input type="text" id="inpViagem">

    <button onclick="adicionar()">Adicionar</button> <br><br>
    <button onclick="primeira()">Primeira Viagem</button>
    <button onclick="terceira()">Terceira Viagem</button>
    <button onclick="ultima()">Última viagem</button>

    <div id="exibirResultado"></div>
    
</body>
</html>

<script>
    let lista = []
    
    function adicionar(){
        let viagem = inpViagem.value
        lista.push(viagem)
    }

    function primeira(){
        if (lista.length == 0 ){
            exibirResultado.innerHTML = `Ainda não viajou`
        } else {
            exibirResultado.innerHTML = lista[0]
        }
    }

    function terceira(){
        if (lista.length <= 1 ){
            exibirResultado.innerHTML = `Ainda fez a terceira viagem`
        } else {
            exibirResultado.innerHTML = lista[2]
        }
    }

    function ultima(){
        let tamanhoLista = lista.length -1
        if (lista.length == 0 ){
            exibirResultado.innerHTML = `Ainda não viajou`
        } else {
            exibirResultado.innerHTML = lista[tamanhoLista]
        }


    }

</script>
