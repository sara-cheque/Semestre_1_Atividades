<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem do Pokémon selecionado </title>
</head>
<body>

    <h3>13. Imagem do Pokémon selecionado </h3>

    Seu pokemon inicial <br><br>
    <input type="text" id="inpPokemon"> <br><br>

    <button onclick="Pokemon()"    style="border-radius: 6px ; background-color: rgb(236, 193, 106);">Escolher Pokemon</button>

    <br><br>

    <img id="img" style="border-radius: 6px;" width="300 px">

</body>
</html>

<script>

    function Pokemon(){
    
        let pokemon = inpPokemon.value

        if (pokemon == `Bulbasaur`){
            img.src = `https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYkqGrg-Z-umsPx9gW4ShZCBLtKzLjHuLnLw&s`
        } else if (pokemon == `Charmander`){
            img.src = `https://s2-ge.glbimg.com/KA7CaWaackKTbVQsYU3uSxZ39Yw=/0x0:1280x670/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2021/k/W/ey3W2jRAmAY9m4dAgfZg/charmander.jpg`
        } else if (pokemon == `Squirtle`) {
            img.src = `https://static0.srcdn.com/wordpress/wp-content/uploads/Squirtle-Looking-Happy.jpg?w=1200&h=675&fit=crop`
        } else {
            alert(`Pokémon não reconhecido.`)
        }
            
    }



</script>
