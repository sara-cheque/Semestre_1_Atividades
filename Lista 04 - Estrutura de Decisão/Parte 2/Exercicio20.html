<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de economia</title>
</head>
<body>

    <h3>Análise de economia</h3>


    Meta de economia
    <input type="text" id="inpMeta"> <br><br>

    Total guardado
    <input type="text" id="inpTotal"> <br><br>

    <button onclick="Analisar()">Analisar economia</button> <br><br>

    <div id="exibirResultado"></div>

    
</body>
</html>

<script>

    function Analisar(){
        let meta = Number(inpMeta.value)
        let total = Number(inpTotal.value)
        let diferenca = 0

        if (total >= meta){
            exibirResultado.innerHTML = `Parabéns, meta alcançada!`
            if (total > meta ){
                diferenca = total - meta
                exibirResultado.innerHTML += `<br> Meta ultrapassada em ${diferenca} reais`

            }
        } else {
            diferenca = meta - total
            exibirResultado.innerHTML = ` Força! Ainda em busca da meta! Falta ${diferenca} reais`
        }
    }



</script>
