<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h3>2. Simulador de Preferências de Compras: Será que Robervaldo Gostaria?</h3>
    
    Tamanho da tela do celular
    <input type="text" id="inpTamanho"> <br><br>

    Cor do celular
    <Select id="select_cor">
        <option selected disabled value="0">Selecione uma opção</option>
        <option value="1">Preto</option>
        <option value="2">Prata</option>
        <option value="3">Azul</option>
        <option value="4">Vermelho</option>
    </Select> <br><br>

    <button onclick="Analisar()">Sera que ele gosta?</button> <br><br>

    <img id="img" width="200px">

</body>
</html>

<script>

    function Analisar(){
        let cor = select_cor.value
        let tamanho = Number(inpTamanho.value)

        if ((cor == 1 || cor == 2) && tamanho >= 6.5){
            img.src='https://th.bing.com/th/id/OIP.5u9haNjb0c2qfBCe_9CLcgHaEl?w=297&h=183&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3'
        } else {
            img.src='https://st2.depositphotos.com/1001911/11353/v/950/depositphotos_113532780-stock-illustration-vector-sorrow-emoticon.jpg'

        }

        
    }



</script>
