<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação do Clima</title>
</head>
<body>

    <h3>5. Avaliação do Clima: Está Agradável ou Desconfortável?</h3>

    temperatura 
    <input type="text" id="inp_temperatura"> <br><br>

    umidade do ar 
    <input type="text" id="inp_umidade"> <br><br>

    <button onclick="Avaliar()">Avaliar clima</button> <br><br>

    <div id="exibirResultado"></div>
    
    
</body>
</html>

<script>

    function Avaliar(){
        let temperatura = Number(inp_temperatura.value)
        let umidade = Number(inp_umidade.value)

        if (umidade < 0 || umidade > 100){
            alert(`Valor de umidade inválido`)
            document.getElementById('inp_temperatura').value = '';
            document.getElementById('inp_umidade').value = '';
            
        } else if ((temperatura == 23 || temperatura == 22)  && umidade <= 60){
            exibirResultado.innerHTML = `Clima agradável`
        } else {
            exibirResultado.innerHTML = `Clima desconfortável`
        }
    }

</script>
